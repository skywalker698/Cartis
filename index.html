<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SugarTIS</title>

<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  font-family:sans-serif;
}

/* loader */
.loader{
  width:120px;height:4px;
  background:#1e293b;
  border-radius:2px;
  overflow:hidden;
  position:relative;
}
.loader::after{
  content:"";
  position:absolute;
  width:40px;height:100%;
  background:#3b82f6;
  animation:slide 1.2s linear infinite;
}
@keyframes slide{
  from{left:-40px} to{left:120px}
}

/* install btn */
#installBtn{
  position:fixed;
  bottom:20px;left:50%;
  transform:translateX(-50%);
  padding:10px 16px;
  border:none;border-radius:8px;
  background:#3b82f6;color:#fff;
  display:none;
}
</style>
</head>

<body>

<div class="loader"></div>
<button id="installBtn">ติดตั้งแอป</button>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbyiFYtt6LKm9bho5oDQHmKBlQShz6nBpJrPPXJ0O2xN-ux6LEC9VDsGrPcHNR4Dy_mc/exec";


// =====================
// PWA MANIFEST
// =====================
const manifest = {
  name:"SugarTIS",
  short_name:"SugarTIS",
  start_url: APP_URL,
  display:"standalone",
  background_color:"#0f172a",
  theme_color:"#0f172a",
  icons:[{
    src:"https://cdn-icons-png.flaticon.com/512/743/743922.png",
    sizes:"192x192",
    type:"image/png"
  }]
};

const mBlob = new Blob([JSON.stringify(manifest)],{type:"application/json"});
const mURL = URL.createObjectURL(mBlob);
const mLink = document.createElement("link");
mLink.rel="manifest";
mLink.href=mURL;
document.head.appendChild(mLink);


// =====================
// SERVICE WORKER
// =====================
if("serviceWorker" in navigator){
  const sw = `
    self.addEventListener("fetch",e=>{
      e.respondWith(fetch(e.request).catch(()=>new Response("Offline")))
    });
  `;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw])));
}


// =====================
// INSTALL BUTTON
// =====================
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display="block";
});

installBtn.onclick = async ()=>{
  deferredPrompt.prompt();
  installBtn.style.display="none";
};


// =====================
// BACK BUTTON CONTROL
// =====================
history.replaceState(null,null,location.href);

window.addEventListener("popstate", ()=>{
  if(confirm("ต้องการออกจากแอปหรือไม่")){
    window.close();
  }else{
    history.pushState(null,null,location.href);
  }
});


// =====================
// REDIRECT → GAS
// =====================
setTimeout(()=>{
  location.replace(APP_URL);
},1200);

</script>

</body>
</html>
