<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<base target="_top">
</head>
<body>

<iframe 
  src="https://script.google.com/macros/s/AKfycbwoqZEJo6A4z-orMT3CBsU3-cCQAF6wFzSo1zRJXDitKR_2yPphnp1kgHUpy1ZVpx4Q/exec"
  style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
  allow="geolocation"
></iframe>

<script>
(function () {
  // ดัน state กันย้อน
  history.pushState(null, null, location.href);

  window.addEventListener('popstate', function () {
    var confirmExit = confirm("คุณต้องการออกจากหน้านี้หรือไม่?");

    if (confirmExit) {
      // อนุญาตให้ย้อนจริง
      history.back();
    } else {
      // กันไม่ให้ย้อน
      history.pushState(null, null, location.href);
    }
  });
})();
</script>

</body>
</html>
