<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<base target="_top">
</head>
<body>

<iframe 
  src="https://script.google.com/macros/s/AKfycbyiFYtt6LKm9bho5oDQHmKBlQShz6nBpJrPPXJ0O2xN-ux6LEC9VDsGrPcHNR4Dy_mc/exec"
  style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
  allow="geolocation"
></iframe>

<script>
(function () {
  // ดัน state กันย้อน
  history.pushState(null, null, location.href);

  window.addEventListener('popstate', function () {
    var confirmExit = confirm("คุณต้องการออกจากหน้านี้หรือไม่?");

    if (confirmExit) {
      // อนุญาตให้ย้อนจริง
      history.back();
    } else {
      // กันไม่ให้ย้อน
      history.pushState(null, null, location.href);
    }
  });
})();
</script>

</body>
</html>
