<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Mobility-TISSUGAR</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycbyiFYtt6LKm9bho5oDQHmKBlQShz6nBpJrPPXJ0O2xN-ux6LEC9VDsGrPcHNR4Dy_mc/exec"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
  allow="geolocation"
></iframe>

<script>
// ==============================
// 📍 GPS SYSTEM
// ==============================
let userLocation = null;

function getGPS() {
  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLocation = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy
      };

      sendGPS();
    },
    (err) => {
      console.warn("GPS Error:", err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

function sendGPS() {
  if (!userLocation) return;

  const frame = document.getElementById("appFrame");

  frame.contentWindow.postMessage({
    type: "USER_LOCATION",
    payload: userLocation
  }, "*");
}


// ==============================
// 🔁 ส่ง GPS หลัง iframe โหลด
// ==============================
document.getElementById("appFrame").addEventListener("load", () => {
  setTimeout(sendGPS, 1500);
});

// เรียกใช้งาน
getGPS();


// ==============================
// 🔁 realtime update
// ==============================
navigator.geolocation.watchPosition((pos) => {
  userLocation = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  };
  sendGPS();
});


// ==============================
// 🔒 ป้องกันปุ่มย้อนกลับ
// ==============================
history.pushState(null, null, location.href);

window.addEventListener("popstate", function () {
  history.pushState(null, null, location.href);
});


// ==============================
// 🔒 กัน reload / ปิด
// ==============================
window.addEventListener("beforeunload", function (e) {
  e.preventDefault();
  e.returnValue = '';
});
</script>

</body>
</html>
