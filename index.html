<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SugarTIS App</title>

<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

/* loader */
.loader {
  width:120px;
  height:4px;
  background:#1e293b;
  border-radius:2px;
  overflow:hidden;
  position:relative;
}

.loader::after {
  content:"";
  position:absolute;
  width:40px;
  height:100%;
  background:#3b82f6;
  animation:slide 1.2s infinite linear;
}

@keyframes slide {
  0% { left:-40px; }
  100% { left:120px; }
}
</style>
</head>

<body>

<div class="loader"></div>

<script>
// ==========================
// CONFIG
// ==========================
const APP_URL = "https://script.google.com/macros/s/AKfycbyiFYtt6LKm9bho5oDQHmKBlQShz6nBpJrPPXJ0O2xN-ux6LEC9VDsGrPcHNR4Dy_mc/exec";

// ==========================
// 1. MANIFEST (สร้าง dynamic)
// ==========================
const manifest = {
  name: "SugarTIS",
  short_name: "SugarTIS",
  start_url: APP_URL,
  display: "standalone",
  background_color: "#0f172a",
  theme_color: "#0f172a",
  icons: [
    {
      src: "https://cdn-icons-png.flaticon.com/512/743/743922.png",
      sizes: "192x192",
      type: "image/png"
    },
    {
      src: "https://cdn-icons-png.flaticon.com/512/743/743922.png",
      sizes: "512x512",
      type: "image/png"
    }
  ]
};

const manifestBlob = new Blob(
  [JSON.stringify(manifest)],
  { type: "application/json" }
);

const manifestURL = URL.createObjectURL(manifestBlob);

const link = document.createElement("link");
link.rel = "manifest";
link.href = manifestURL;
document.head.appendChild(link);

// ==========================
// 2. SERVICE WORKER
// ==========================
if ("serviceWorker" in navigator) {

  const swCode = `
    const CACHE_NAME = "sugartis-v1";

    self.addEventListener("install", e => {
      self.skipWaiting();
    });

    self.addEventListener("activate", e => {
      self.clients.claim();
    });

    self.addEventListener("fetch", event => {
      event.respondWith(
        fetch(event.request).catch(() => {
          return new Response(
            "<h3 style='font-family:sans-serif'>📡 Offline</h3>",
            { headers: { "Content-Type": "text/html" } }
          );
        })
      );
    });

    // PUSH (future ready)
    self.addEventListener("push", function(event) {
      const data = event.data ? event.data.text() : "Notification";
      self.registration.showNotification("SugarTIS", {
        body: data,
        icon: "https://cdn-icons-png.flaticon.com/512/743/743922.png"
      });
    });
  `;

  const swBlob = new Blob([swCode], { type: "text/javascript" });
  const swURL = URL.createObjectURL(swBlob);

  navigator.serviceWorker.register(swURL);
}

// ==========================
// 3. INSTALL PROMPT
// ==========================
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // แสดงปุ่ม install แบบ native
  showInstallButton();
});

function showInstallButton() {
  const btn = document.createElement("button");
  btn.innerText = "ติดตั้งแอป";
  btn.style = `
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    z-index:9999;
  `;

  btn.onclick = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt = null;
      btn.remove();
    }
  };

  document.body.appendChild(btn);
}

// ==========================
// 4. REDIRECT → GAS
// ==========================
setTimeout(() => {
  window.location.replace(APP_URL);
}, 1200);

</script>

</body>
</html>
