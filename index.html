<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobility-TISSUGAR</title>

<style>
  body, html {
    margin: 0;
    height: 100%;
    width: 100%;
    background: #f0f0f0;
    font-family: sans-serif;
    overflow: hidden;
  }

  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    z-index: 999;
    transition: opacity 1s ease;
    opacity: 1;
  }

  #loader.fadeout {
    opacity: 0;
    pointer-events: none;
  }

  .bar-loader {
    width: 120px;
    max-width: 60%;
    height: 14px;
    background: #ececec;
    border-radius: 7px;
    overflow: hidden;
    position: relative;
  }

  .bar-inner {
    width: 40px;
    height: 100%;
    background: #4285f4;
    border-radius: 7px;
    position: absolute;
    left: -40px;
    animation: barmove 1.5s infinite linear;
  }

  @keyframes barmove {
    0% { left: -40px;}
    100% { left: 120px;}
  }

  #content-iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(.4,0,.2,1);
    z-index: 1;
  }

  #content-iframe.visible {
    opacity: 1;
  }
</style>
</head>

<body>

<div id="loader">
  <div class="bar-loader">
    <div class="bar-inner"></div>
  </div>
</div>

<iframe id="content-iframe"
        src="https://script.google.com/macros/s/AKfycbyiFYtt6LKm9bho5oDQHmKBlQShz6nBpJrPPXJ0O2xN-ux6LEC9VDsGrPcHNR4Dy_mc/exec">
</iframe>

<script>
const loader = document.getElementById('loader');
const iframe = document.getElementById('content-iframe');

// ==============================
// Loader (ของเดิม)
// ==============================
setTimeout(() => {
  loader.classList.add('fadeout');
  setTimeout(() => {
    loader.style.display = 'none';
    iframe.classList.add('visible');
  }, 1000);
}, 1500);


// ==============================
// 🔒 ป้องกันปุ่มย้อนกลับ (เดิม)
// ==============================
history.pushState(null, null, location.href);

window.addEventListener('popstate', function () {
  const confirmExit = confirm('ต้องการออกจากหน้านี้หรือไม่ ?');

  if (confirmExit) {
    history.back();
  } else {
    history.pushState(null, null, location.href);
  }
});


// ==============================
// 🔒 กัน reload (เดิม)
// ==============================
window.addEventListener('beforeunload', function (e) {
  e.preventDefault();
  e.returnValue = '';
});


// ===================================================
// 📍 GPS SYSTEM (เพิ่มใหม่ - ไม่กระทบของเดิม)
// ===================================================
let userLocation = null;

// ดึง GPS ครั้งแรก
function initGPS() {
  if (!("geolocation" in navigator)) {
    console.warn("GPS not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      userLocation = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy
      };

      console.log("📍 GPS Ready:", userLocation);
      sendLocationToIframe();
    },
    function (err) {
      console.warn("GPS Error:", err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}


// ส่งค่าเข้า iframe
function sendLocationToIframe() {
  if (!userLocation) return;

  const frame = document.getElementById('content-iframe');

  if (frame && frame.contentWindow) {
    frame.contentWindow.postMessage({
      type: "USER_LOCATION",
      payload: userLocation
    }, "*");
  }
}


// ส่งเมื่อ iframe โหลด
iframe.addEventListener('load', () => {
  setTimeout(() => {
    sendLocationToIframe();
  }, 1500);
});


// เริ่ม GPS
initGPS();


// ===================================================
// 🔁 OPTIONAL: อัปเดตตำแหน่ง realtime (ไม่กระทบ)
// ===================================================
navigator.geolocation.watchPosition(
  function (pos) {
    userLocation = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };
    sendLocationToIframe();
  },
  function () {},
  { enableHighAccuracy: true }
);

</script>

</body>
</html>
